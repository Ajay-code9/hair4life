<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Hair4Life Clinic | Premium Hair Restoration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="preconnect" href="https://img.youtube.com" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
              serif: ['"Playfair Display"', 'serif'],
            },
            colors: {
              gold: {
                50: '#F0FDF4',
                100: '#DCFCE7',
                200: '#BBF7D0',
                300: '#86EFAC',
                400: '#4ADE80',
                500: '#008554', // Logo Green
                600: '#007A4D',
                700: '#15803D',
                800: '#166534',
                900: '#14532D',
              },
              dark: {
                800: '#2C3E50',
                900: '#1F3554', // Logo Blue
                950: '#0B121E', // Deepest Navy
              }
            },
            animation: {
              'fade-in': 'fadeIn 1s ease-out forwards',
              'slide-up': 'slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'page-enter': 'pageEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'scale-in': 'scaleIn 1.5s ease-out forwards',
              'slow-zoom': 'slowZoom 20s linear infinite alternate',
              'float': 'float 6s ease-in-out infinite',
              'marquee': 'marquee 25s linear infinite',
              'shimmer': 'shimmer 3s infinite',
              'draw-line': 'drawLine 1.5s ease-out forwards',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              pageEnter: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              scaleIn: {
                 '0%': { opacity: '0', transform: 'scale(0.95)' },
                 '100%': { opacity: '1', transform: 'scale(1)' },
              },
              slowZoom: {
                '0%': { transform: 'scale(1)' },
                '100%': { transform: 'scale(1.1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              shimmer: {
                '0%': { transform: 'translateX(-100%) skewX(-15deg)' },
                '100%': { transform: 'translateX(200%) skewX(-15deg)' },
              },
              drawLine: {
                '0%': { width: '0%' },
                '100%': { width: '100%' },
              }
            }
          }
        }
      }
    </script>
    <style>
      /* Smooth scrolling */
      html { 
        scroll-behavior: smooth; 
        cursor: none; 
      }
      
      @media (max-width: 768px) {
        html { cursor: auto; }
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0B121E; }
      ::-webkit-scrollbar-thumb { background: #1F3554; border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: #008554; }
      
      .text-balance { text-wrap: balance; }
      .text-outline {
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.1);
        color: transparent;
      }

      /* Noise Overlay */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9998;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Custom Cursor Styles */
      .cursor-dot,
      .cursor-outline {
        position: fixed;
        top: 0;
        left: 0;
        pointer-events: none;
        z-index: 9999;
        will-change: transform;
        transform: translate(-50%, -50%);
      }
      
      .cursor-dot {
        width: 8px;
        height: 8px;
        background-color: #4ADE80; /* Gold-400 */
        border-radius: 50%;
      }

      .cursor-outline {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        transition: width 0.15s cubic-bezier(0.23, 1, 0.32, 1), 
                    height 0.15s cubic-bezier(0.23, 1, 0.32, 1), 
                    background-color 0.15s ease,
                    border-color 0.15s ease;
      }
      
      body:hover .cursor-outline.hovered {
        width: 60px;
        height: 60px;
        background-color: rgba(0, 133, 84, 0.1);
        border-color: #4ADE80;
      }

      /* Text Reveal Utilities */
      .reveal-container { overflow: hidden; }
      .reveal-text {
        animation: slideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        opacity: 0;
        transform: translateY(100%);
      }
      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-500 { animation-delay: 500ms; }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-dark-950 text-slate-200 antialiased selection:bg-gold-500/30 selection:text-gold-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
